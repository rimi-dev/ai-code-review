server:
  port: 8080

spring:
  application:
    name: review-bot
  data:
    mongodb:
      uri: mongodb://localhost:27017/ai_code_review
    redis:
      host: localhost
      port: 6379

review-bot:
  github:
    webhook-secret: ${GITHUB_WEBHOOK_SECRET:changeme}
    app-id: ${GITHUB_APP_ID:0}
    private-key-path: ${GITHUB_PRIVATE_KEY_PATH:/etc/secrets/github-app.pem}
    api-base-url: ${GITHUB_API_BASE_URL:https://api.github.com}
  llm:
    vllm-base-url: ${VLLM_BASE_URL:http://localhost:8000}
    vllm-model: ${VLLM_MODEL:default}
    vllm-timeout: ${VLLM_TIMEOUT:120s}
    claude-base-url: ${CLAUDE_BASE_URL:https://api.anthropic.com}
    claude-api-key: ${CLAUDE_API_KEY:}
    claude-model: ${CLAUDE_MODEL:claude-sonnet-4-20250514}
    claude-api-version: ${CLAUDE_API_VERSION:2024-01-01}
    claude-timeout: ${CLAUDE_TIMEOUT:60s}
    max-tokens: ${LLM_MAX_TOKENS:4096}
  review:
    max-diff-lines: ${REVIEW_MAX_DIFF_LINES:3000}
    max-files: ${REVIEW_MAX_FILES:50}
    exclude-patterns:
      - "*.lock"
      - "*.min.js"
      - "*.min.css"
      - "*.map"
      - "package-lock.json"
      - "yarn.lock"
      - "pnpm-lock.yaml"
      - "go.sum"
      - "*.pb.go"
      - "*.generated.*"
    context-lines: ${REVIEW_CONTEXT_LINES:3}
    stream-key: ${REDIS_STREAM_KEY:review-queue}
    consumer-group: ${REDIS_CONSUMER_GROUP:review-workers}
    consumer-name: ${REDIS_CONSUMER_NAME:worker-1}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.reviewer: DEBUG
    org.springframework.data.mongodb: INFO
    org.springframework.data.redis: INFO
