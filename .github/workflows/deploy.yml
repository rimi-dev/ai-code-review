name: Deploy Review Bot

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        env:
          REPO: ${{ github.repository }}
        run: echo "IMAGE_NAME=${REGISTRY}/${REPO}/review-bot" >> "$GITHUB_ENV"

      - name: Build and Push Docker Image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "${IMAGE_NAME}:${IMAGE_TAG}" -t "${IMAGE_NAME}:latest" review-bot/
          docker push "${IMAGE_NAME}:${IMAGE_TAG}"
          docker push "${IMAGE_NAME}:latest"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure Kubernetes Context
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "${KUBE_CONFIG_DATA}" | base64 -d > "$HOME/.kube/config"

      - name: Update Kubernetes Deployment
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          kubectl set image deployment/review-bot \
            "review-bot=${IMAGE_NAME}:${IMAGE_TAG}" \
            -n review-bot

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/review-bot -n review-bot --timeout=300s
