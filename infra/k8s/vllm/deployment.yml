apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-server
  namespace: ai-code-review
  labels:
    app: vllm-server
    part-of: ai-code-review
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-server
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: vllm-server
        part-of: ai-code-review
    spec:
      containers:
        - name: vllm-server
          image: ghcr.io/ai-code-review/vllm-server:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              memory: 16Gi
              cpu: "4"
              nvidia.com/gpu: "1"
            limits:
              memory: 16Gi
              cpu: "4"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: model-weights
              mountPath: /models
              readOnly: true
      volumes:
        - name: model-weights
          persistentVolumeClaim:
            claimName: vllm-model-weights
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      imagePullSecrets:
        - name: ghcr-credentials
