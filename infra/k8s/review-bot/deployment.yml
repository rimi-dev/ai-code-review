apiVersion: apps/v1
kind: Deployment
metadata:
  name: review-bot
  namespace: ai-code-review
  labels:
    app: review-bot
    part-of: ai-code-review
spec:
  replicas: 2
  selector:
    matchLabels:
      app: review-bot
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: review-bot
        part-of: ai-code-review
    spec:
      containers:
        - name: review-bot
          image: ghcr.io/ai-code-review/review-bot:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: review-bot-config
            - secretRef:
                name: review-bot-secret
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: 512Mi
              cpu: 500m
            limits:
              memory: 1Gi
              cpu: 1000m
      imagePullSecrets:
        - name: ghcr-credentials
