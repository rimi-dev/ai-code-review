apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: review-bot-hpa
  namespace: review-bot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: review-bot
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
