apiVersion: v1
kind: Secret
metadata:
  name: review-bot-secret
  namespace: ai-code-review
  labels:
    app: review-bot
    part-of: ai-code-review
type: Opaque
stringData:
  # Replace placeholder values before applying
  GITHUB_APP_PRIVATE_KEY: "<REPLACE_WITH_GITHUB_APP_PRIVATE_KEY>"
  GITHUB_APP_ID: "<REPLACE_WITH_GITHUB_APP_ID>"
  GITHUB_WEBHOOK_SECRET: "<REPLACE_WITH_WEBHOOK_SECRET>"
  CLAUDE_API_KEY: "<REPLACE_WITH_CLAUDE_API_KEY>"
