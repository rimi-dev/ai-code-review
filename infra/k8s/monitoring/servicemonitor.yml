apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: review-bot
  namespace: ai-code-review
  labels:
    app: review-bot
    part-of: ai-code-review
    release: prometheus
spec:
  selector:
    matchLabels:
      app: review-bot
  namespaceSelector:
    matchNames:
      - ai-code-review
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
      scrapeTimeout: 10s
