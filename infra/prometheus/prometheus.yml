global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert-rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'review-bot'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['review-bot:8080']
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
