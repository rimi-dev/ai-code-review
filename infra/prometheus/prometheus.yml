global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "review-bot"
    metrics_path: "/actuator/prometheus"
    scrape_interval: 10s
    static_configs:
      - targets: ["review-bot:8080"]

  - job_name: "vllm"
    metrics_path: "/metrics"
    scrape_interval: 30s
    static_configs:
      - targets: ["vllm-server:8000"]
